<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importer les points</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .container-sm {
            max-width: 500px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container-sm">
        <h1 class="mb-4 text-center">Importer les points</h1>

        <div class="card p-4 shadow">
            <form action="/sae/import" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="csvFile" class="form-label">Sélectionner un fichier CSV</label>
                    <input class="form-control" type="file" id="csvFile" name="csvFile" accept=".csv" required>
                    <div class="form-text">Seuls les fichiers .csv sont acceptés.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Envoyer</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
